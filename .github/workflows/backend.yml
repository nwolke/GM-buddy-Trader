name: Backend CI

on:
  push:
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - 'GMBuddyTrader.slnx'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - 'GMBuddyTrader.slnx'
      - '.github/workflows/backend.yml'

jobs:
  build:
    name: Restore, Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore GMBuddyTrader.slnx

      - name: Build
        run: dotnet build GMBuddyTrader.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test GMBuddyTrader.slnx --no-build --configuration Release --verbosity normal
