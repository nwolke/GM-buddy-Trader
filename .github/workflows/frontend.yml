name: Frontend CI

on:
  push:
    paths:
      - 'src/gmbuddy-trader-web/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'src/gmbuddy-trader-web/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/gmbuddy-trader-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/gmbuddy-trader-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:5001' }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID || 'us-east-1_placeholder' }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID || 'placeholder' }}
